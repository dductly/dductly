# Render Blueprint: deploy only the Express API from backend/
# https://render.com/docs/blueprint-specification
services:
  - type: web
    name: dductly-backend
    runtime: node
    rootDir: backend
    # typescript + @types are in dependencies so production npm install still runs tsc.
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
